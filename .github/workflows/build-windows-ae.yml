name: Build AE Analyzer (Windows .exe)

on:
  push:
    paths:
      - 'WindowSoftware_ed4/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: WindowSoftware_ed4
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Windows .exe with PyInstaller
        working-directory: WindowSoftware_ed4
        run: |
          pyinstaller AE_Analyzer.spec

      - name: Upload .exe as artifact
        uses: actions/upload-artifact@v4
        with:
          name: AE_Analyzer-Windows
          path: WindowSoftware_ed4/dist/AE_Analyzer.exe
          retention-days: 30

      - name: Create GitHub Release with .exe
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-build
          name: AE Analyzer - Latest Windows Build
          body: |
            Windows build of the AE Analyzer app.
            Download AE_Analyzer.exe below and run it directly — no Python needed.
          files: WindowSoftware_ed4/dist/AE_Analyzer.exe
          prerelease: false
